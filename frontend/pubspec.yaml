name: deriv_trading
description: AI-powered automated trading platform for Deriv
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.4.10

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # ── Storage ───────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # ── Charts ────────────────────────────────────────────────────────────────
  fl_chart: ^0.66.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.18.1
  timeago: ^3.6.0
  uuid: ^4.3.3
  logger: ^2.0.2
  equatable: ^2.0.5
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
