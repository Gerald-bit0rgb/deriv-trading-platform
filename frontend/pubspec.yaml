name: deriv_trading
description: AI-powered automated trading platform for Deriv
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── UI ───────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1
  retrofit: ^4.1.0

  # ── Storage ───────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # ── Charts ────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^26.1.35

  # ── Notifications ─────────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.2
  logger: ^2.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/


