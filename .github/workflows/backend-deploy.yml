# ─────────────────────────────────────────────────────────────────────────────
# Backend CD — deploys to Render on every push to main
#
# Prerequisites (set these in GitHub → Settings → Secrets and variables → Actions):
#   RENDER_API_KEY    — from Render dashboard → Account Settings → API Keys
#   RENDER_SERVICE_ID — from your Render service URL (srv-xxxxxxxx)
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to Render

on:
  workflow_dispatch:  # Only run manually — not on push
    # To trigger: GitHub → Actions → Deploy to Render → Run workflow

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    # Only deploy after CI passes
    needs: []   # add "test" from backend-ci.yml if you want to gate on tests

    steps:
      - name: Trigger Render deploy via API
        run: |
          curl -s -o response.json -w "%{http_code}" \
            --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --data '{"clearCache":"do_not_clear"}' > status_code.txt

          STATUS=$(cat status_code.txt)
          echo "Render API response status: $STATUS"
          cat response.json

          if [ "$STATUS" != "201" ]; then
            echo "Render deploy trigger failed with status $STATUS"
            exit 1
          fi
          echo "Render deployment triggered successfully!"
