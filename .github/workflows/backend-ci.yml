# ─────────────────────────────────────────────────────────────────────────────
# Backend CI — runs on every push / PR to main
# ─────────────────────────────────────────────────────────────────────────────
name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  # ── Lint & test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      SYNC_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      SECRET_KEY: ci-test-secret-key-that-is-long-enough-for-jwt-hmac-256
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      DERIV_APP_ID: "1"
      DERIV_WS_URL: wss://ws.derivws.com/websockets/v3
      CORS_ORIGINS: http://localhost
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 black isort

      - name: Lint with flake8
        run: |
          flake8 backend/app --max-line-length=100 --ignore=E501,W503,E302,E241,E221,E702,E741,E272,W504 --exclude=__pycache__

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short

  # ── Docker build check ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — just verify it builds)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: deriv-trading-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
