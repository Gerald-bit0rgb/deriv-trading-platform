version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack:  docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deriv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deriv_pass}
      POSTGRES_DB: ${POSTGRES_DB:-deriv_trading}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deriv_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deriv_user}:${POSTGRES_PASSWORD:-deriv_pass}@db:5432/${POSTGRES_DB:-deriv_trading}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-deriv_user}:${POSTGRES_PASSWORD:-deriv_pass}@db:5432/${POSTGRES_DB:-deriv_trading}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app        # live-reload in dev
      - app_logs:/app/logs

volumes:
  postgres_data:
  app_logs:
